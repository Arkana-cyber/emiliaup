<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emilia Viewer | Emilia Company</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .viewer-container { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); padding: 2rem; border-radius: 1.5rem; text-align: center; }
        img, video { max-height: 80vh; max-width: 100%; border-radius: 0.75rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>
    <div id="content" class="viewer-container">
        <p class="animate-pulse text-blue-400">Loading Emilia Asset...</p>
    </div>

    <script>
        async function loadFile() {
            const urlParams = new URLSearchParams(window.location.search);
            const filePath = urlParams.get('filepath');
            const container = document.getElementById('content');

            if (!filePath) {
                container.innerHTML = `<p class="text-red-400">Error: No filepath provided.</p>`;
                return;
            }

            // Mencari file asli di repo berdasarkan ID 6 digit
            // Karena GitHub menyimpan file dengan timestamp_nama.ext, kita perlu mencari file yang mengandung ID tersebut
            const githubApi = `https://api.github.com/repos/Arkana-cyber/images-/contents/media`;
            const idToSearch = filePath.split('/').pop().split('.')[0];

            try {
                const response = await fetch(githubApi);
                const files = await response.json();
                
                // Cari file yang SHA-nya (ID-nya) cocok
                const foundFile = files.find(f => f.sha.startsWith(idToSearch));

                if (foundFile) {
                    const rawUrl = `https://cdn.jsdelivr.net/gh/Arkana-cyber/images-@main/${foundFile.path}`;
                    const isVideo = foundFile.name.match(/\.(mp4|webm|ogg)$/i);

                    if (isVideo) {
                        container.innerHTML = `<video src="${rawUrl}" controls autoplay class="mx-auto"></video>`;
                    } else {
                        container.innerHTML = `<img src="${rawUrl}" alt="Asset" class="mx-auto">`;
                    }
                } else {
                    container.innerHTML = `<p class="text-red-400">Asset Not Found in Database.</p>`;
                }
            } catch (err) {
                container.innerHTML = `<p class="text-red-400">System Error: Failed to fetch.</p>`;
            }
        }
        loadFile();
    </script>
</body>
</html>
