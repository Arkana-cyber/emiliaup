<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emilia Uploader | Emilia Company Official</title>
    
    <meta name="description" content="Emilia Uploader by Emilia Company. High-end media cloud deployment system managed by Zezen Radcliffe.">
    <meta name="keywords" content="emilia uploader, emilia company, emilia bot, zezen radcliffe, cloud storage, uploader emilia">
    <meta name="author" content="Zezen Radcliffe">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center p-4 md:p-6">

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-7 space-y-6">
            <header>
                <div class="flex items-center gap-3 mb-2">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                        <i class="fas fa-bolt text-white text-xl"></i>
                    </div>
                    <h1 class="text-4xl font-extrabold tracking-tight">Emilia <span class="text-blue-500">Uploader</span></h1>
                </div>
                <p class="text-slate-400">System Operator: <span class="text-blue-400">Zezen Radcliffe</span></p>
            </header>

            <div class="glass-premium rounded-3xl p-6 md:p-10">
                <div id="drop-zone" class="uploader-box rounded-2xl p-8 text-center cursor-pointer relative min-h-[250px] flex flex-col items-center justify-center">
                    <input type="file" id="file-input" class="hidden" accept="image/*,video/*">
                    <div id="upload-placeholder" class="space-y-4">
                        <div class="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mx-auto transition-transform duration-500 group-hover:scale-110">
                            <i class="fas fa-cloud-arrow-up text-3xl text-blue-500"></i>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold text-white">Deploy New Asset</h3>
                            <p class="text-slate-400 text-sm mt-1">Tap to browse or drag media here</p>
                        </div>
                    </div>
                    <div id="preview-area" class="preview-container hidden w-full"></div>
                </div>

                <button id="upload-btn" class="btn-elite w-full mt-8 text-white font-bold py-5 rounded-2xl text-lg flex items-center justify-center gap-3">
                    <i class="fas fa-paper-plane"></i> INITIALIZE UPLOAD
                </button>

                <div id="result-box" class="mt-8 hidden animate-in fade-in slide-in-from-bottom-4">
                    <label class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.3em] block mb-3">Global CDN URL</label>
                    <div class="flex gap-3">
                        <input type="text" id="url-output" readonly class="w-full bg-slate-900 border border-white/10 rounded-xl px-5 py-4 text-sm font-mono text-blue-300 focus:outline-none">
                        <button id="copy-btn" class="bg-slate-800 px-6 rounded-xl hover:bg-slate-700 transition-all border border-white/10 active:scale-95">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="glass-premium rounded-3xl p-8 h-full flex flex-col min-h-[400px]">
                <h2 class="text-xl font-bold mb-8 flex items-center gap-3">
                    <i class="fas fa-terminal text-blue-500"></i> Activity Log
                </h2>
                <div id="history-list" class="space-y-4 overflow-y-auto max-h-[600px] pr-2 custom-scrollbar">
                    <div id="empty-history" class="text-center py-20 opacity-20">
                        <i class="fas fa-database text-5xl mb-4"></i>
                        <p class="text-sm font-medium uppercase tracking-widest">No Logs Found</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
